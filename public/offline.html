<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0b1d3a" />
    <title>Çevrimdışı — GüneşOS</title>
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; height: 100%; }
      body {
        background: radial-gradient(ellipse at top, #1a2f5a 0%, #0b1d3a 60%, #050b1a 100%);
        color: #f5e9c8;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        display: flex; align-items: center; justify-content: center;
        text-align: center; padding: 24px;
      }
      .card { max-width: 360px; }
      .sun {
        width: 96px; height: 96px; margin: 0 auto 24px;
        border-radius: 50%;
        background: radial-gradient(circle at 35% 35%, #ffd76b, #f59e0b 60%, #b8410f 100%);
        box-shadow: 0 0 60px rgba(255, 196, 64, 0.45);
      }
      h1 { font-size: 22px; margin: 0 0 8px; font-weight: 600; }
      p { font-size: 14px; opacity: 0.75; line-height: 1.5; margin: 0 0 24px; }
      button {
        background: #f59e0b; color: #0b1d3a; border: 0;
        padding: 12px 24px; border-radius: 12px;
        font-weight: 600; font-size: 14px; cursor: pointer;
      }
      button:hover { background: #fbbf24; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="sun"></div>
      <h1>Güneş şu an bulutların ardında</h1>
      <p>İnternet bağlantın yok. Bağlantı geri geldiğinde GüneşOS otomatik olarak yüklenecek.</p>
      <button onclick="location.reload()">Tekrar dene</button>
    </div>
  </body>
</html>
